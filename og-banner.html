<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OG Banner</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap">
  <style>
    :root {
      --bg: #08080a;
      --text: #e8e8ed;
      --text-muted: #6b6b76;
      --accent: #fb923c;
      --accent-glow: rgba(251, 146, 60, 0.25);
      --border: #222228;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      position: relative;
      background-image: radial-gradient(circle at 1px 1px, rgba(251, 146, 60, 0.04) 1px, transparent 0);
      background-size: 32px 32px;
    }
    .glow {
      position: absolute;
      top: 50%;
      right: -120px;
      transform: translateY(-50%);
      width: 720px;
      height: 720px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
      opacity: 0.7;
      pointer-events: none;
    }
    .frame {
      position: absolute;
      inset: 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .top .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .center {
      max-width: 980px;
    }
    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 14px;
      letter-spacing: 0.18em;
      color: var(--accent);
      background: rgba(251, 146, 60, 0.08);
      border: 1px solid rgba(251, 146, 60, 0.18);
      padding: 6px 12px;
      border-radius: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    h1 {
      font-family: var(--display);
      font-weight: 800;
      font-size: 112px;
      line-height: 0.95;
      letter-spacing: -0.035em;
    }
    h1 .accent {
      display: block;
      color: var(--accent);
    }
    .tagline {
      font-family: var(--sans);
      font-size: 30px;
      font-weight: 400;
      line-height: 1.35;
      color: var(--text);
      margin-top: 36px;
      max-width: 820px;
    }
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    .bottom .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bottom .left::before {
      content: '//';
      color: var(--border);
    }
    .bottom .right {
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="frame">
    <div class="top">
      <span class="dot"></span>
      <span>MD_</span>
      <span style="color: var(--border);">/</span>
      <span style="color: var(--text-muted);">Digital Studio</span>
    </div>

    <div class="center">
      <span class="tag">UG (haftungsbeschränkt)</span>
      <h1>moellenbeck<span class="accent">digital</span></h1>
      <p class="tagline">Pragmatisch gebaute Software, Automatisierung und KI.</p>
    </div>

    <div class="bottom">
      <span class="left">Digital &middot; Remote</span>
      <span class="right">moellenbeck-digital.io &rarr;</span>
    </div>
  </div>
</body>
</html>
